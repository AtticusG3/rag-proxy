{% extends "base.html" %}
{% block title %}Login - RAG Admin{% endblock %}
{% block content %}
<section class="card auth-card">
  <p class="auth-kicker">Secure access</p>
  <h1>Sign in</h1>
  <p class="muted">Manage ZIM ingest, catalog subscriptions, and Qdrant indexing.</p>
  {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Password
      <input type="password" name="password" required autofocus autocomplete="current-password">
    </label>
    <button type="submit" class="btn--block">Enter admin</button>
  </form>
</section>
{% endblock %}

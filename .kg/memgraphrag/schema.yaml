version: 1

graph:
  name: memgraphrag-ontology
  description: MemGraphRAG three-layer memory ontology (schema / fact / passage) and corpus instances

entities:
  - type: MgrRoot
    id_prefix: mgr-root
  - type: MgrLayer
    id_prefix: mgr-layer
  - type: MgrEntityClass
    id_prefix: mgr-class
    description: Closed NER types from LLM extraction prompt
  - type: MgrOntologyPattern
    id_prefix: mgr-pattern
    description: Schema-layer pattern (head_type, relation, tail_type)
  - type: MgrEntity
    id_prefix: mgr-entity
    description: Named entity instance (head or tail of a fact)
  - type: MgrFact
    id_prefix: mgr-fact
    description: Grounded triple in the fact layer
  - type: MgrPassage
    id_prefix: mgr-passage
    description: Source text chunk in the passage layer
  - type: MgrComponent
    id_prefix: mgr-component
    description: Code component implementing MemGraphRAG

relations:
  - type: CONTAINS
    cardinality: many_to_many
  - type: ALLOWS_CLASS
    description: Extraction prompt permits this entity class
  - type: HAS_HEAD_CLASS
    from: MgrOntologyPattern
    to: MgrEntityClass
  - type: HAS_TAIL_CLASS
    from: MgrOntologyPattern
    to: MgrEntityClass
  - type: CONFORMS_TO
    from: MgrFact
    to: MgrOntologyPattern
  - type: HAS_HEAD
    from: MgrFact
    to: MgrEntity
  - type: HAS_TAIL
    from: MgrFact
    to: MgrEntity
  - type: EXTRACTED_IN
    from: MgrFact
    to: MgrPassage
  - type: PERSISTS_IN
    from: MgrLayer
    to: MgrComponent
  - type: IMPLEMENTS
    from: MgrComponent
    to: MgrLayer
  - type: USES
    description: Runtime dependency between components
  - type: PRECEDES
    description: Online retrieval step order

provenance:
  required_fields: [source, extracted_at]
  optional_fields: [confidence]

constraints:
  - rule: unique_node_id
  - rule: edge_endpoints_exist
  - rule: predicate_in_schema

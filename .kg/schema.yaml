version: 2

graph:
  name: rag-proxy-architecture
  description: Full-stack knowledge graph for rag_proxy (architecture, pipeline, ops, ingest/admin)

entities:
  - type: Repository
    id_prefix: repo
  - type: Package
    id_prefix: package
  - type: Module
    id_prefix: module
  - type: PipelineStage
    id_prefix: stage
  - type: Route
    id_prefix: route
  - type: Service
    id_prefix: service
  - type: Config
    id_prefix: config
  - type: Script
    id_prefix: script
  - type: Document
    id_prefix: document
  - type: Dependency
    id_prefix: dependency
  - type: EnvVar
    id_prefix: env
  - type: Subgraph
    id_prefix: subgraph
    description: Linked knowledge graph partition

relations:
  - type: CONTAINS
    cardinality: many_to_many
  - type: DEFINES
    cardinality: many_to_many
  - type: DEPENDS_ON
    cardinality: many_to_many
  - type: EXPOSES
    cardinality: many_to_many
  - type: HAS_CONFIG
    cardinality: many_to_many
  - type: IMPLEMENTS
    cardinality: many_to_many
    description: Module implements a pipeline stage
  - type: PRECEDES
    cardinality: one_to_many
    description: Pipeline stage execution order
  - type: TOGGLED_BY
    cardinality: many_to_one
    description: Stage gated by env var
  - type: USES_ONTOLOGY
    cardinality: many_to_one
    description: Pipeline stage uses a subgraph ontology
  - type: CONFIGURED_BY
    cardinality: many_to_many
    description: Component configured via env var

provenance:
  required_fields: [source, extracted_at]
  optional_fields: [confidence]

constraints:
  - rule: unique_node_id
  - rule: edge_endpoints_exist
  - rule: predicate_in_schema
